name: Sync FetchLater Feed

on:
  workflow_dispatch:
    inputs:
      fetchlater_tag:
        description: "Optional FetchLater release tag to publish, such as v1.0.34"
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public feed
        uses: actions/checkout@v4

      - name: Sync FetchLater feed
        env:
          GH_TOKEN: ${{ github.token }}
          FETCHLATER_TAG: ${{ inputs.fetchlater_tag }}
        run: python3 scripts/sync_fetchlater_feed.py

      - name: Commit feed update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fetchlater/update.json
          if git diff --cached --quiet; then
            echo "FetchLater feed is already current."
            exit 0
          fi
          version="$(python3 -c 'import json; print(json.load(open("fetchlater/update.json"))["version"])')"
          git commit -m "Update FetchLater feed to v${version}"
          git push
